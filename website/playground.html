<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MINT Site Design Playground</title>
<style>
/* ---- Playground UI (dark theme) ---- */
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --ui-bg: #1a1a2e;
  --ui-surface: #16213e;
  --ui-border: #2a2a4a;
  --ui-text: #e0e0e0;
  --ui-muted: #8888aa;
  --ui-accent: #2ec4b6;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--ui-bg);
  color: var(--ui-text);
  height: 100vh;
  overflow: hidden;
}

.playground-layout {
  display: grid;
  grid-template-columns: 320px 1fr;
  grid-template-rows: 1fr auto;
  height: 100vh;
}

/* ---- Controls Panel ---- */
.controls {
  grid-row: 1 / 3;
  background: var(--ui-surface);
  border-right: 1px solid var(--ui-border);
  overflow-y: auto;
  padding: 1rem;
}
.controls h1 {
  font-size: 1rem;
  color: var(--ui-accent);
  margin-bottom: 0.5rem;
  letter-spacing: 0.05em;
}
.controls-section {
  margin-bottom: 1.25rem;
  padding-bottom: 1.25rem;
  border-bottom: 1px solid var(--ui-border);
}
.controls-section:last-child { border-bottom: none; }
.controls-section h2 {
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--ui-muted);
  margin-bottom: 0.75rem;
}
.control-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 0.5rem;
  gap: 0.5rem;
}
.control-row label {
  font-size: 0.8rem;
  color: var(--ui-text);
  white-space: nowrap;
}
.control-row .value {
  font-size: 0.75rem;
  color: var(--ui-muted);
  min-width: 3.5rem;
  text-align: right;
  font-family: 'SF Mono', 'Cascadia Code', monospace;
}
input[type="range"] {
  flex: 1;
  accent-color: var(--ui-accent);
  min-width: 80px;
}
input[type="color"] {
  width: 2rem;
  height: 1.5rem;
  border: 1px solid var(--ui-border);
  border-radius: 3px;
  cursor: pointer;
  background: none;
  padding: 0;
}
select {
  background: var(--ui-bg);
  color: var(--ui-text);
  border: 1px solid var(--ui-border);
  border-radius: 4px;
  padding: 0.25rem 0.5rem;
  font-size: 0.8rem;
  font-family: inherit;
}
.presets {
  display: flex;
  flex-wrap: wrap;
  gap: 0.35rem;
  margin-bottom: 1rem;
}
.preset-btn {
  padding: 0.3rem 0.7rem;
  border: 1px solid var(--ui-border);
  border-radius: 4px;
  background: var(--ui-bg);
  color: var(--ui-text);
  font-size: 0.75rem;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.15s;
}
.preset-btn:hover, .preset-btn.active {
  border-color: var(--ui-accent);
  color: var(--ui-accent);
}
.preset-btn.active {
  background: rgba(46,196,182,0.12);
}

/* ---- Preview ---- */
.preview-wrap {
  overflow: auto;
  background: #fff;
}
.preview-frame {
  min-height: 100%;
}

/* ---- Prompt Output ---- */
.prompt-bar {
  background: var(--ui-surface);
  border-top: 1px solid var(--ui-border);
  padding: 0.75rem 1rem;
  display: flex;
  align-items: flex-start;
  gap: 0.75rem;
}
.prompt-text {
  flex: 1;
  font-size: 0.8rem;
  color: var(--ui-text);
  font-family: 'SF Mono', 'Cascadia Code', monospace;
  line-height: 1.5;
  max-height: 4.5em;
  overflow-y: auto;
  white-space: pre-wrap;
}
.copy-btn {
  padding: 0.4rem 1rem;
  background: var(--ui-accent);
  color: #fff;
  border: none;
  border-radius: 4px;
  font-size: 0.8rem;
  cursor: pointer;
  font-family: inherit;
  white-space: nowrap;
  flex-shrink: 0;
  transition: opacity 0.15s;
}
.copy-btn:hover { opacity: 0.85; }
</style>
</head>
<body>
<div class="playground-layout">

  <!-- ============ CONTROLS ============ -->
  <div class="controls">
    <h1>MINT Site Playground</h1>
    <p style="font-size:0.75rem; color:var(--ui-muted); margin-bottom:1rem;">Adjust controls, preview live, copy the prompt.</p>

    <div class="presets">
      <button class="preset-btn active" onclick="applyPreset('current')">Current</button>
      <button class="preset-btn" onclick="applyPreset('airy')">Airy</button>
      <button class="preset-btn" onclick="applyPreset('compact')">Compact</button>
      <button class="preset-btn" onclick="applyPreset('warm')">Warm</button>
      <button class="preset-btn" onclick="applyPreset('academic')">Academic</button>
    </div>

    <!-- Colors -->
    <div class="controls-section">
      <h2>Colors</h2>
      <div class="control-row">
        <label>Navy</label>
        <input type="color" id="c-navy" value="#0a1628" oninput="update()">
        <span class="value" id="v-navy">#0a1628</span>
      </div>
      <div class="control-row">
        <label>Mint accent</label>
        <input type="color" id="c-mint" value="#2ec4b6" oninput="update()">
        <span class="value" id="v-mint">#2ec4b6</span>
      </div>
      <div class="control-row">
        <label>Body text</label>
        <input type="color" id="c-text" value="#2d3436" oninput="update()">
        <span class="value" id="v-text">#2d3436</span>
      </div>
      <div class="control-row">
        <label>Alt section bg</label>
        <input type="color" id="c-altbg" value="#f8f9fa" oninput="update()">
        <span class="value" id="v-altbg">#f8f9fa</span>
      </div>
    </div>

    <!-- Typography -->
    <div class="controls-section">
      <h2>Typography</h2>
      <div class="control-row">
        <label>Font</label>
        <select id="c-font" onchange="update()">
          <option value="system" selected>System (default)</option>
          <option value="serif">Serif (Georgia)</option>
          <option value="inter">Inter-like (sans)</option>
          <option value="mono">Monospace</option>
        </select>
      </div>
      <div class="control-row">
        <label>Base size</label>
        <input type="range" id="c-fontsize" min="14" max="20" value="17" step="0.5" oninput="update()">
        <span class="value" id="v-fontsize">17px</span>
      </div>
      <div class="control-row">
        <label>Line height</label>
        <input type="range" id="c-lineheight" min="1.3" max="2.0" value="1.7" step="0.05" oninput="update()">
        <span class="value" id="v-lineheight">1.7</span>
      </div>
      <div class="control-row">
        <label>Heading weight</label>
        <select id="c-headweight" onchange="update()">
          <option value="500">500 (medium)</option>
          <option value="600" selected>600 (semi-bold)</option>
          <option value="700">700 (bold)</option>
          <option value="800">800 (extra-bold)</option>
        </select>
      </div>
    </div>

    <!-- Spacing & Layout -->
    <div class="controls-section">
      <h2>Spacing &amp; Layout</h2>
      <div class="control-row">
        <label>Content width</label>
        <input type="range" id="c-maxwidth" min="700" max="1100" value="900" step="10" oninput="update()">
        <span class="value" id="v-maxwidth">900px</span>
      </div>
      <div class="control-row">
        <label>Section padding</label>
        <input type="range" id="c-secpad" min="2" max="8" value="5" step="0.5" oninput="update()">
        <span class="value" id="v-secpad">5rem</span>
      </div>
      <div class="control-row">
        <label>Card padding</label>
        <input type="range" id="c-cardpad" min="0.75" max="3" value="1.5" step="0.25" oninput="update()">
        <span class="value" id="v-cardpad">1.5rem</span>
      </div>
      <div class="control-row">
        <label>Card radius</label>
        <input type="range" id="c-radius" min="0" max="16" value="8" step="1" oninput="update()">
        <span class="value" id="v-radius">8px</span>
      </div>
      <div class="control-row">
        <label>Card border</label>
        <select id="c-cardborder" onchange="update()">
          <option value="subtle" selected>Subtle (1px gray)</option>
          <option value="accent">Accent left bar</option>
          <option value="none">None (shadow only)</option>
          <option value="strong">Strong (2px navy)</option>
        </select>
      </div>
    </div>

    <!-- Nav -->
    <div class="controls-section">
      <h2>Navigation</h2>
      <div class="control-row">
        <label>Nav height</label>
        <input type="range" id="c-navheight" min="3" max="5" value="4" step="0.25" oninput="update()">
        <span class="value" id="v-navheight">4rem</span>
      </div>
      <div class="control-row">
        <label>Nav border</label>
        <select id="c-navborder" onchange="update()">
          <option value="mint" selected>Mint accent line</option>
          <option value="none">None</option>
          <option value="gradient">Gradient</option>
        </select>
      </div>
    </div>

    <!-- People Grid -->
    <div class="controls-section">
      <h2>People Cards</h2>
      <div class="control-row">
        <label>Min card width</label>
        <input type="range" id="c-pplwidth" min="180" max="350" value="250" step="10" oninput="update()">
        <span class="value" id="v-pplwidth">250px</span>
      </div>
    </div>
  </div>

  <!-- ============ PREVIEW ============ -->
  <div class="preview-wrap">
    <div class="preview-frame" id="preview"></div>
  </div>

  <!-- ============ PROMPT OUTPUT ============ -->
  <div class="prompt-bar">
    <div class="prompt-text" id="prompt-text">Adjust controls to generate a design prompt.</div>
    <button class="copy-btn" id="copy-btn" onclick="copyPrompt()">Copy Prompt</button>
  </div>

</div>

<script>
// ---- Defaults ----
var DEFAULTS = {
  navy: '#0a1628', mint: '#2ec4b6', text: '#2d3436', altbg: '#f8f9fa',
  font: 'system', fontsize: 17, lineheight: 1.7, headweight: '600',
  maxwidth: 900, secpad: 5, cardpad: 1.5, radius: 8, cardborder: 'subtle',
  navheight: 4, navborder: 'mint', pplwidth: 250
};

var PRESETS = {
  current: { ...DEFAULTS },
  airy: {
    ...DEFAULTS, fontsize: 18, lineheight: 1.85, maxwidth: 820, secpad: 7,
    cardpad: 2, radius: 12, cardborder: 'none', altbg: '#f0f4f3'
  },
  compact: {
    ...DEFAULTS, fontsize: 15, lineheight: 1.55, maxwidth: 960, secpad: 3,
    cardpad: 1, radius: 4, pplwidth: 200
  },
  warm: {
    ...DEFAULTS, navy: '#1a1a2e', mint: '#e07a5f', text: '#3d405b', altbg: '#f4f1de',
    font: 'serif', headweight: '700', radius: 6
  },
  academic: {
    ...DEFAULTS, font: 'serif', fontsize: 18, lineheight: 1.75, headweight: '700',
    maxwidth: 800, secpad: 5.5, cardborder: 'strong', radius: 2, navborder: 'none'
  }
};

var state = { ...DEFAULTS };

// ---- Font stacks ----
var FONT_STACKS = {
  system: "-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif",
  serif: "Georgia, 'Times New Roman', serif",
  inter: "'Inter', -apple-system, BlinkMacSystemFont, sans-serif",
  mono: "'SF Mono', 'Cascadia Code', 'Fira Code', monospace"
};

// ---- Read controls into state ----
function readControls() {
  state.navy = document.getElementById('c-navy').value;
  state.mint = document.getElementById('c-mint').value;
  state.text = document.getElementById('c-text').value;
  state.altbg = document.getElementById('c-altbg').value;
  state.font = document.getElementById('c-font').value;
  state.fontsize = parseFloat(document.getElementById('c-fontsize').value);
  state.lineheight = parseFloat(document.getElementById('c-lineheight').value);
  state.headweight = document.getElementById('c-headweight').value;
  state.maxwidth = parseInt(document.getElementById('c-maxwidth').value);
  state.secpad = parseFloat(document.getElementById('c-secpad').value);
  state.cardpad = parseFloat(document.getElementById('c-cardpad').value);
  state.radius = parseInt(document.getElementById('c-radius').value);
  state.cardborder = document.getElementById('c-cardborder').value;
  state.navheight = parseFloat(document.getElementById('c-navheight').value);
  state.navborder = document.getElementById('c-navborder').value;
  state.pplwidth = parseInt(document.getElementById('c-pplwidth').value);
}

function writeControls() {
  document.getElementById('c-navy').value = state.navy;
  document.getElementById('c-mint').value = state.mint;
  document.getElementById('c-text').value = state.text;
  document.getElementById('c-altbg').value = state.altbg;
  document.getElementById('c-font').value = state.font;
  document.getElementById('c-fontsize').value = state.fontsize;
  document.getElementById('c-lineheight').value = state.lineheight;
  document.getElementById('c-headweight').value = state.headweight;
  document.getElementById('c-maxwidth').value = state.maxwidth;
  document.getElementById('c-secpad').value = state.secpad;
  document.getElementById('c-cardpad').value = state.cardpad;
  document.getElementById('c-radius').value = state.radius;
  document.getElementById('c-cardborder').value = state.cardborder;
  document.getElementById('c-navheight').value = state.navheight;
  document.getElementById('c-navborder').value = state.navborder;
  document.getElementById('c-pplwidth').value = state.pplwidth;
}

function updateValueLabels() {
  document.getElementById('v-navy').textContent = state.navy;
  document.getElementById('v-mint').textContent = state.mint;
  document.getElementById('v-text').textContent = state.text;
  document.getElementById('v-altbg').textContent = state.altbg;
  document.getElementById('v-fontsize').textContent = state.fontsize + 'px';
  document.getElementById('v-lineheight').textContent = state.lineheight.toFixed(2);
  document.getElementById('v-maxwidth').textContent = state.maxwidth + 'px';
  document.getElementById('v-secpad').textContent = state.secpad + 'rem';
  document.getElementById('v-cardpad').textContent = state.cardpad + 'rem';
  document.getElementById('v-radius').textContent = state.radius + 'px';
  document.getElementById('v-navheight').textContent = state.navheight + 'rem';
  document.getElementById('v-pplwidth').textContent = state.pplwidth + 'px';
}

// ---- Derive a lighter tint from a hex color ----
function lighten(hex, amt) {
  var r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  r = Math.min(255, r + Math.round((255-r)*amt));
  g = Math.min(255, g + Math.round((255-g)*amt));
  b = Math.min(255, b + Math.round((255-b)*amt));
  return '#' + [r,g,b].map(function(v){return v.toString(16).padStart(2,'0');}).join('');
}

// ---- Card border style ----
function cardBorderCSS() {
  switch(state.cardborder) {
    case 'subtle': return 'border: 1px solid #dfe6e9;';
    case 'accent': return 'border: none; border-left: 3px solid ' + state.mint + '; box-shadow: 0 1px 4px rgba(0,0,0,0.06);';
    case 'none': return 'border: none; box-shadow: 0 2px 8px rgba(0,0,0,0.08);';
    case 'strong': return 'border: 2px solid ' + state.navy + ';';
    default: return 'border: 1px solid #dfe6e9;';
  }
}

// ---- Nav border style ----
function navBorderCSS() {
  switch(state.navborder) {
    case 'mint': return 'border-bottom: 2px solid ' + state.mint + ';';
    case 'none': return 'border-bottom: none;';
    case 'gradient': return 'border-bottom: 2px solid transparent; border-image: linear-gradient(90deg, ' + state.mint + ', ' + lighten(state.mint, 0.4) + ') 1;';
    default: return 'border-bottom: 2px solid ' + state.mint + ';';
  }
}

// ---- Render preview ----
function renderPreview() {
  var fontStack = FONT_STACKS[state.font] || FONT_STACKS.system;
  var mintLight = lighten(state.mint, 0.3);
  var mintFaint = lighten(state.mint, 0.85);

  var html = '<div style="font-family:' + fontStack + '; font-size:' + state.fontsize + 'px; line-height:' + state.lineheight + '; color:' + state.text + '; background:#fff;">';

  // Nav
  html += '<div style="background:' + state.navy + '; ' + navBorderCSS() + ' height:' + state.navheight + 'rem; display:flex; align-items:center; padding:0 2rem;">';
  html += '<div style="max-width:' + state.maxwidth + 'px; margin:0 auto; width:100%; display:flex; align-items:center; justify-content:space-between;">';
  html += '<span style="color:#fff; font-weight:700; font-size:1.1em;">🦑 MINT Lab</span>';
  html += '<div style="display:flex; gap:2rem;">';
  ['About','Research','Feed','People','Contact'].forEach(function(s) {
    html += '<a style="color:rgba(255,255,255,0.8); text-decoration:none; font-size:0.9em; font-weight:500;">' + s + '</a>';
  });
  html += '</div></div></div>';

  // Hero
  html += '<div style="text-align:center; padding:' + (state.secpad * 1.4) + 'rem 2rem ' + state.secpad + 'rem;">';
  html += '<div style="max-width:' + state.maxwidth + 'px; margin:0 auto;">';
  html += '<div style="font-size:2.2em; font-weight:' + state.headweight + '; color:' + state.navy + '; margin-bottom:0.5rem;">🦑 MINT Lab</div>';
  html += '<div style="font-size:1.2em; color:#636e72; margin-bottom:0.5rem;">Machine Intelligence and Normative Theory</div>';
  html += '<div style="font-size:0.9em; color:#636e72;">Founded at the Australian National University · Now at Johns Hopkins University</div>';
  html += '</div></div>';

  // About (alt bg)
  html += '<div style="background:' + state.altbg + '; padding:' + state.secpad + 'rem 2rem;">';
  html += '<div style="max-width:' + state.maxwidth + 'px; margin:0 auto;">';
  html += '<div style="font-size:0.8em; font-weight:700; text-transform:uppercase; letter-spacing:0.12em; color:' + state.mint + '; margin-bottom:0.5rem;">About</div>';
  html += '<div style="font-size:1.5em; font-weight:' + state.headweight + '; color:' + state.navy + '; margin-bottom:1rem;">The Lab</div>';
  html += '<p style="max-width:720px;"><strong style="color:' + state.navy + ';">Seth Lazar</strong> is Professor of Philosophy at Johns Hopkins University and founding director of MINT Lab. His research focuses on the normative philosophy of computing — foundational questions about what computational tools should be used for, who decides, and how AI systems reshape power, agency, and moral life.</p>';
  html += '<p style="max-width:720px; margin-top:1rem;">MINT Lab develops robust philosophical foundations for AI governance and safety. We do empirically- and technically-grounded philosophical work on AI and computational technologies, bridging normative theory with real-world impact.</p>';
  html += '</div></div>';

  // Research cards
  html += '<div style="padding:' + state.secpad + 'rem 2rem;">';
  html += '<div style="max-width:' + state.maxwidth + 'px; margin:0 auto;">';
  html += '<div style="font-size:0.8em; font-weight:700; text-transform:uppercase; letter-spacing:0.12em; color:' + state.mint + '; margin-bottom:0.5rem;">Research</div>';
  html += '<div style="font-size:1.5em; font-weight:' + state.headweight + '; color:' + state.navy + '; margin-bottom:1.5rem;">Current Projects</div>';
  html += '<div style="display:grid; gap:1.25rem;">';
  var projects = [
    {icon:'⚖️', title:'Normative Competence', summary:'How should AI systems handle moral reasoning? We investigate the foundations of normative competence in artificial agents.'},
    {icon:'🤖', title:'Agents', summary:'Language model agents are becoming autonomous actors in the world. We study their societal impact and the norms to guide their behaviour.'},
    {icon:'🌐', title:'Post-AGI Political Philosophy', summary:'What political institutions do we need for a world with transformatively powerful AI? We develop frameworks for governance and flourishing.'}
  ];
  projects.forEach(function(p) {
    html += '<div style="' + cardBorderCSS() + ' border-radius:' + state.radius + 'px; padding:' + state.cardpad + 'rem ' + (state.cardpad * 1.3) + 'rem;">';
    html += '<div style="display:flex; justify-content:space-between; align-items:center;">';
    html += '<div style="font-size:1.15em; font-weight:' + state.headweight + '; color:' + state.navy + ';">' + p.icon + ' ' + p.title + '</div>';
    html += '<span style="color:#636e72;">▼</span>';
    html += '</div>';
    html += '<p style="margin-top:0.6rem; color:#636e72; font-size:0.93em;">' + p.summary + '</p>';
    html += '</div>';
  });
  html += '</div></div></div>';

  // Feed (alt bg)
  html += '<div style="background:' + state.altbg + '; padding:' + state.secpad + 'rem 2rem;">';
  html += '<div style="max-width:' + state.maxwidth + 'px; margin:0 auto;">';
  html += '<div style="font-size:0.8em; font-weight:700; text-transform:uppercase; letter-spacing:0.12em; color:' + state.mint + '; margin-bottom:0.5rem;">Feed</div>';
  html += '<div style="font-size:1.5em; font-weight:' + state.headweight + '; color:' + state.navy + '; margin-bottom:1rem;">Publications, Events &amp; News</div>';
  html += '<div style="display:flex; gap:0.5rem; margin-bottom:1.5rem;">';
  ['All','Publications','Events','Newsletter','News'].forEach(function(f, i) {
    var isActive = i === 0;
    html += '<button style="padding:0.35rem 0.9rem; border-radius:20px; font-size:0.83em; font-weight:500; cursor:pointer; border:1px solid ' + (isActive ? state.mint : '#dfe6e9') + '; background:' + (isActive ? state.mint : '#fff') + '; color:' + (isActive ? '#fff' : '#636e72') + '; font-family:inherit;">' + f + '</button>';
  });
  html += '</div>';
  var feedItems = [
    {type:'publication', badge:mintFaint, badgeColor:state.mint, date:'2025', title:'Build Agent Advocates, Not Platform Agents', meta:'Kapoor, Kolt, Lazar · ICML 2025'},
    {type:'publication', badge:mintFaint, badgeColor:state.mint, date:'2025', title:'Can LLMs Advance Democratic Values?', meta:'Lazar, Manuali · FAccT 2025'},
    {type:'event', badge:'#fff3e0', badgeColor:'#e67e22', date:'2024', title:'NeurIPS Keynote: Philosophical Foundations for Pluralistic Alignment', meta:'Invited keynote at NeurIPS conference'},
    {type:'newsletter', badge:'#fce4ec', badgeColor:'#c62828', date:'2025', title:'Monthly newsletter post', meta:'Philosophy of Computing · Substack'},
    {type:'news', badge:'#e8eaf6', badgeColor:'#5c6bc0', date:'2025', title:'MINT Lab Moves to Johns Hopkins University', meta:'The lab relocates from ANU to JHU'}
  ];
  feedItems.forEach(function(item) {
    html += '<div style="padding:1rem 0; border-bottom:1px solid #dfe6e9; display:flex; gap:1.5rem; align-items:baseline;">';
    html += '<span style="font-size:0.83em; color:#636e72; min-width:3.5rem;">' + item.date + '</span>';
    html += '<div><div style="font-size:1em; font-weight:600; color:' + state.navy + '; margin-bottom:0.2rem;">';

  var people = [

// ---- Generate prompt ----
function updatePrompt() {
  var parts = [];
  if (state.navy !== DEFAULTS.navy) parts.push('navy to ' + state.navy);
  if (state.mint !== DEFAULTS.mint) parts.push('mint/accent to ' + state.mint);
  if (state.text !== DEFAULTS.text) parts.push('body text color to ' + state.text);
  if (state.altbg !== DEFAULTS.altbg) parts.push('alternating section background to ' + state.altbg);
  if (state.font !== DEFAULTS.font) {
    var names = {serif:'Georgia/serif', inter:'Inter/clean sans', mono:'monospace'};
    parts.push('font to ' + (names[state.font] || state.font));
  }
  if (state.fontsize !== DEFAULTS.fontsize) parts.push('base font size to ' + state.fontsize + 'px');
  if (state.lineheight !== DEFAULTS.lineheight) parts.push('line-height to ' + state.lineheight.toFixed(2));
  if (state.headweight !== DEFAULTS.headweight) parts.push('heading weight to ' + state.headweight);
  if (state.maxwidth !== DEFAULTS.maxwidth) parts.push('content max-width to ' + state.maxwidth + 'px');
  if (state.secpad !== DEFAULTS.secpad) parts.push('section vertical padding to ' + state.secpad + 'rem');
  if (state.cardpad !== DEFAULTS.cardpad) parts.push('card padding to ' + state.cardpad + 'rem');
  if (state.radius !== DEFAULTS.radius) parts.push('card border-radius to ' + state.radius + 'px');
  if (state.cardborder !== DEFAULTS.cardborder) {
    var styles = {subtle:'subtle 1px gray border', accent:'left accent bar with shadow', none:'borderless with shadow', strong:'strong 2px navy border'};
    parts.push('card style to ' + styles[state.cardborder]);
  }
  if (state.navheight !== DEFAULTS.navheight) parts.push('nav height to ' + state.navheight + 'rem');
  if (state.navborder !== DEFAULTS.navborder) {
    var nb = {mint:'mint accent line', none:'no bottom border', gradient:'gradient bottom border'};
    parts.push('nav border to ' + nb[state.navborder]);
  }
  if (state.pplwidth !== DEFAULTS.pplwidth) parts.push('people card min-width to ' + state.pplwidth + 'px');

  var prompt;
  if (parts.length === 0) {
    prompt = 'No changes from defaults. Adjust controls to generate a design prompt.';
  } else {
    prompt = 'Update the MINT website style.css: change ' + parts.join(', ') + '.';
  }
  document.getElementById('prompt-text').textContent = prompt;
}

// ---- Main update ----
function update() {
  readControls();
  updateValueLabels();
  renderPreview();
  updatePrompt();
  // Clear active preset
  document.querySelectorAll('.preset-btn').forEach(function(b) { b.classList.remove('active'); });
}

// ---- Presets ----
function applyPreset(name) {
  state = { ...PRESETS[name] };
  writeControls();
  updateValueLabels();
  renderPreview();
  updatePrompt();
  document.querySelectorAll('.preset-btn').forEach(function(b) { b.classList.remove('active'); });
  event.target.classList.add('active');
}

// ---- Copy ----
function copyPrompt() {
  var text = document.getElementById('prompt-text').textContent;
  navigator.clipboard.writeText(text).then(function() {
    var btn = document.getElementById('copy-btn');
    btn.textContent = 'Copied!';
    setTimeout(function() { btn.textContent = 'Copy Prompt'; }, 1500);
  });
}

// ---- Init ----
writeControls();
updateValueLabels();
renderPreview();
updatePrompt();
</script>
