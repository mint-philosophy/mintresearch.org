    <style>
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: #000000;
        font-family: Inter;
        color: #ffffff;
      }
      .container-box {
        margin: 8px 16px 8px 16px;
        padding: 12px;
        border-radius: 16px;
        line-height: 0.95;
        width: fit-content;
        height: fit-content;
        z-index: 2;
        backdrop-filter: blur(3px);
        background: #000000aa;
        box-shadow: 2px 3px 10px #00000044;
        position: relative;
        pointer-events: auto;
      }
      .more-opaque {
        backdrop-filter: blur(6px);
        background-color: #000000ee;
      }
      #deck-container {
        width: 100vw;
        height: 100vh;  
      }
      #deck-container canvas {
        z-index: 1;
        background: #000000;
      }
      .deck-tooltip {
          
            font-size: 0.8em;
            font-family: Inter;
            font-weight: 300;
            color: #ffffff !important;
            background-color: #000000ee !important;
            border-radius: 12px;
            backdrop-filter: blur(6px);
            box-shadow: 2px 3px 10px #00000044;
            max-width: 25%;
      }
      input {
        margin: 2px;
        padding: 4px;
        border-radius: 8px;
        color: #ffffff;
        background: #000000dd;
        border: 2px inset #77777744;
        transition: 0.5s;
        outline: none;
        box-sizing: border-box;
      }
      input:focus {
        border: 2px inset #555;
      }
      #search-container{
        width: fit-content;
      }
      
    #filter-panel {
        position: absolute;
        top: 70px;
        right: 16px;
        background: rgba(20,20,20,0.92);
        backdrop-filter: blur(8px);
        padding: 12px;
        border-radius: 12px;
        font-family: system-ui, sans-serif;
        z-index: 1000;
        max-height: calc(100vh - 100px);
        overflow-y: auto;
        width: 260px;
        pointer-events: auto;
        scrollbar-width: thin;
        scrollbar-color: #444 transparent;
    }
    #filter-panel::-webkit-scrollbar { width: 4px; }
    #filter-panel::-webkit-scrollbar-thumb { background: #444; border-radius: 2px; }
    #filter-panel-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 8px;
        padding-bottom: 6px;
        border-bottom: 1px solid #333;
    }
    #filter-panel-header span {
        color: #aaa;
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }
    .filter-header-btns { display: flex; gap: 4px; }
    .filter-header-btn {
        background: rgba(255,255,255,0.08);
        border: none;
        color: #888;
        font-size: 10px;
        padding: 3px 8px;
        border-radius: 4px;
        cursor: pointer;
        transition: all 0.15s;
    }
    .filter-header-btn:hover { background: rgba(255,255,255,0.15); color: #fff; }
    #mode-toggle {
        display: flex;
        background: rgba(255,255,255,0.06);
        border-radius: 6px;
        padding: 2px;
        margin-bottom: 8px;
    }
    .mode-btn {
        flex: 1;
        background: none;
        border: none;
        color: #666;
        font-size: 10px;
        padding: 5px 4px;
        border-radius: 4px;
        cursor: pointer;
        transition: all 0.15s;
        text-align: center;
        white-space: nowrap;
    }
    .mode-btn.active { background: rgba(255,255,255,0.12); color: #fff; }
    .mode-btn:hover:not(.active) { color: #aaa; }
    .filter-section-label {
        color: #666;
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin: 8px 0 4px 0;
    }
    #category-section, #discipline-section {
        transition: max-height 0.2s ease, opacity 0.2s ease;
        overflow: hidden;
    }
    #category-section.hidden, #discipline-section.hidden {
        max-height: 0; opacity: 0; margin: 0; padding: 0;
    }
    #category-chips, #discipline-chips { display: flex; flex-wrap: wrap; gap: 4px; }
    .filter-chip {
        background: rgba(255,255,255,0.06);
        border: 1px solid var(--chip-color, #555);
        color: #ccc;
        font-size: 11px;
        padding: 4px 8px;
        border-radius: 6px;
        cursor: pointer;
        transition: all 0.15s;
        display: inline-flex;
        align-items: center;
        gap: 4px;
        line-height: 1.2;
    }
    .filter-chip.active {
        background: color-mix(in srgb, var(--chip-color) 25%, transparent);
        border-color: var(--chip-color);
        color: #fff;
    }
    .filter-chip:not(.active) { opacity: 0.45; border-color: #333; }
    .filter-chip:hover {
        opacity: 1;
        background: color-mix(in srgb, var(--chip-color) 35%, transparent);
    }
    .chip-count { font-size: 9px; color: #888; font-weight: 400; }
    #year-range { display: flex; align-items: center; gap: 6px; margin-top: 4px; }
    .year-input {
        width: 55px;
        background: rgba(255,255,255,0.08);
        border: 1px solid #444;
        color: #ccc;
        font-size: 12px;
        padding: 4px 6px;
        border-radius: 4px;
        text-align: center;
        font-family: system-ui, sans-serif;
    }
    .year-input:focus { border-color: #6b9; outline: none; }
    #year-range span { color: #666; font-size: 11px; }
    #filter-count {
        color: #6b9;
        font-size: 11px;
        margin-top: 8px;
        padding-top: 6px;
        border-top: 1px solid #333;
        text-align: center;
    }
    #toggle-filters {
        position: absolute;
        top: 70px;
        right: 16px;
        background: rgba(30,30,30,0.9);
        border: 1px solid #444;
        color: #aaa;
        font-size: 11px;
        padding: 6px 12px;
        border-radius: 6px;
        cursor: pointer;
        z-index: 1001;
        font-family: system-ui, sans-serif;
        pointer-events: auto;
        display: none;
        transition: all 0.15s;
    }
    #toggle-filters:hover { color: #fff; background: rgba(50,50,50,0.95); }
    #stats-display {
        position: absolute;
        bottom: 20px;
        right: 20px;
        background: rgba(30,30,30,0.9);
        padding: 12px 16px;
        border-radius: 8px;
        font-family: system-ui, sans-serif;
        color: #aaa;
        font-size: 12px;
        z-index: 1000;
        pointer-events: auto;
    }
    #credits-btn {
        position: absolute;
        bottom: 20px;
        left: 20px;
        background: rgba(30,30,30,0.9);
        padding: 8px 12px;
        border-radius: 6px;
        font-family: system-ui, sans-serif;
        color: #888;
        font-size: 11px;
        z-index: 1000;
        cursor: pointer;
        text-decoration: none;
        transition: color 0.2s, background 0.2s;
        pointer-events: auto;
    }
    #credits-btn:hover { color: #fff; background: rgba(50,50,50,0.95); }
    
    </style>

  <script type="module">
    function debounce(func, timeout = 250) {
        let timer;
        return (...args) => {
            clearTimeout(timer);
            timer = setTimeout(() => { func.apply(this, args); }, timeout);
        };
    }

    async function simpleArrowParser(arrow_bytes) {
      const table = await Arrow.tableFromIPC(arrow_bytes);
      const result = {};
      table.schema.fields.forEach((field) => {
        result[field.name] = table.getChild(field.name).toArray();
      });
      return result;
    }

    function mergeTypedArrays(arrays) {
        let totalLength = arrays.reduce((acc, arr) => acc + arr.length, 0);
        let result = new arrays[0].constructor(totalLength);
        let currentLength = 0;
        for (let arr of arrays) {
            result.set(arr, currentLength);
            currentLength += arr.length;
        }
        return result;
    }

    function combineTypedTableChunks(tableChunks) {
      tableChunks.sort((a, b) => a.chunkIndex - b.chunkIndex);
      const combinedTable = {};
      Object.keys(tableChunks[0].chunkData).forEach((key) => {
        const arrays = tableChunks.map((chunk) => chunk.chunkData[key]);
        combinedTable[key] = mergeTypedArrays(arrays);
      });
      return combinedTable;
    }

    function combineTableChunks(tableChunks) {
      tableChunks.sort((a, b) => a.chunkIndex - b.chunkIndex);
      const combinedTable = {};
      Object.keys(tableChunks[0].chunkData).forEach((key) => {
        const arrays = tableChunks.map((chunk) => chunk.chunkData[key]);
        combinedTable[key] = arrays.flat();
      });
      return combinedTable;
    }
    if (!("CompressionStream" in window)) {

      );

    const currentURL = self.location.pathname;
    const directoryPath = currentURL.substring(0, currentURL.lastIndexOf('/') + 1);
    const originURL = self.location.origin + directoryPath;

    const pointDataEncoded = [

    const parsingWorkerBlob = new Blob([`
      self.onmessage = async function(event) {
        const { encodedData, JSONParse } = event.data;
        async function decompressFile(filename) {
          try {
            const response = await fetch(filename);
            if (!response.ok) {
              throw new Error(\`HTTP error! status: \${response.status}. Failed to fetch: \${filename}\`);
            }
            const reader = response.body
              .pipeThrough(new DecompressionStream("gzip"))
              .getReader();

            let chunks = [];
            let totalSize = 0;

            while (true) {
              const { done, value } = await reader.read();
              if (done) {
                break;
              }

              totalSize += value.length;
            }

            const decompressedData = new Uint8Array(totalSize);
            let position = 0;
            for (const chunk of chunks) {
              decompressedData.set(chunk, position);
              position += chunk.length;
            }

            return decompressedData;
          } catch (error) {
            console.error('Decompression failed:', error);
            throw error;
          }

          const binaryData = await decompressFile(file);

    function updateProgressBar(id, progress) {
      const progressBar = document.querySelector(`#${id} .datamapplot-progress-bar-fill`);
      const progressText = document.querySelector(`#${id} .datamapplot-progress-bar-text`);
      progressBar.style.width = `${progress}%`;
      progressText.textContent = `${id.replace('-progress', '').replace(/-/g, ' ').replace(/\b\w/g, l => l.toUpperCase())}: ${progress}%`;

      if (allLoaded) {
        document.getElementById("loading").style.display = "none";
        document.getElementById("progress-container").style.display = "none";

      pointDataWorker.postMessage({encodedData: pointDataEncoded, JSONParse: false});

        } else {

    }

    }

    function loadMetaData() {

            <span>${hoverData.year[index]}</span>
            <span style="color:#6b9; font-weight:500;">${hoverData.category[index]}</span>
            <span style="color:#7eb5d6;">${hoverData.discipline[index]}</span>
        </div>
        <div style="font-size:11px; color:#ccc; line-height:1.4;">
            ${hoverData.abstract[index]}
        </div>
    </div>
    `} : null,
            onClickFunction: null,
            searchField: "searchable",
          });

          
          /* Search */
          searchItem.addEventListener("input", debounce(event => datamap.searchText(event.target.value)));
          updateProgressBar('meta-data-progress', 100);
          checkAllDataLoaded();
        }
      };
    }

    loadPointDataLayer();

    const TOTAL_PAPERS = 1889;

    const activeCategories = new Set(Object.keys(CAT_INDEX));
    const activeDisciplines = new Set(Object.keys(DISC_INDEX));
    const ALL_CAT_COUNT = Object.keys(CAT_INDEX).length;
    const ALL_DISC_COUNT = Object.keys(DISC_INDEX).length;
    let yearMin = 1945;
    let yearMax = 2026;
    let filtersApplied = false;
    let currentMode = 'both';

    function applyFilters() {
        const useCats = currentMode === 'areas' || currentMode === 'both';
        const useDiscs = currentMode === 'disciplines' || currentMode === 'both';
        const allCatsActive = !useCats || activeCategories.size === ALL_CAT_COUNT;
        const allDiscsActive = !useDiscs || activeDisciplines.size === ALL_DISC_COUNT;
        const fullYearRange = yearMin <= 1945 && yearMax >= 2026;

        if (allCatsActive && allDiscsActive && fullYearRange) {
            if (filtersApplied) {
                datamap.removeSelection('category-filter');
                filtersApplied = false;
            }
            document.getElementById('filter-count').textContent =
                TOTAL_PAPERS.toLocaleString() + ' / ' + TOTAL_PAPERS.toLocaleString() + ' papers';
            return;
        }

        let yearValid = new Set();
        for (let y = yearMin; y <= yearMax; y++) {
            const indices = YEAR_INDEX[String(y)];
            if (indices) indices.forEach(i => yearValid.add(i));
        }
        if (yearMin <= 1945 && YEAR_INDEX["0"]) {
            YEAR_INDEX["0"].forEach(i => yearValid.add(i));
        }

        let catValid = null;
        if (useCats && activeCategories.size < ALL_CAT_COUNT) {
            catValid = new Set();
            for (const cat of activeCategories) {
                const indices = CAT_INDEX[cat];
                if (indices) indices.forEach(i => catValid.add(i));
            }
        }

        let discValid = null;
        if (useDiscs && activeDisciplines.size < ALL_DISC_COUNT) {
            discValid = new Set();
            for (const disc of activeDisciplines) {
                const indices = DISC_INDEX[disc];
                if (indices) indices.forEach(i => discValid.add(i));
            }
        }

        const matchingIndices = [];
        for (let i = 0; i < TOTAL_PAPERS; i++) {
            if (!yearValid.has(i)) continue;
            if (catValid !== null && !catValid.has(i)) continue;
            if (discValid !== null && !discValid.has(i)) continue;
            matchingIndices.push(i);
        }

        datamap.addSelection(matchingIndices, 'category-filter');
        filtersApplied = true;
        document.getElementById('filter-count').textContent =
            matchingIndices.length.toLocaleString() + ' / ' + TOTAL_PAPERS.toLocaleString() + ' papers';
    }

    function setMode(mode) {
        currentMode = mode;
        const catSection = document.getElementById('category-section');
        const discSection = document.getElementById('discipline-section');
        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.mode === mode);
        });
        if (mode === 'areas') {
            catSection.classList.remove('hidden');
            discSection.classList.add('hidden');
        } else if (mode === 'disciplines') {
            catSection.classList.add('hidden');
            discSection.classList.remove('hidden');
        } else {
            catSection.classList.remove('hidden');
            discSection.classList.remove('hidden');
        }
        applyFilters();
    }

    function initFilters() {
        document.querySelectorAll('.cat-chip').forEach(chip => {
            chip.addEventListener('click', () => {
                const cat = chip.dataset.category;
                chip.classList.toggle('active');
                if (chip.classList.contains('active')) activeCategories.add(cat);
                else activeCategories.delete(cat);
                applyFilters();
            });
        });
        document.querySelectorAll('.disc-chip').forEach(chip => {
            chip.addEventListener('click', () => {
                const disc = chip.dataset.discipline;
                chip.classList.toggle('active');
                if (chip.classList.contains('active')) activeDisciplines.add(disc);
                else activeDisciplines.delete(disc);
                applyFilters();
            });
        });
        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.addEventListener('click', () => setMode(btn.dataset.mode));
        });
        document.getElementById('btn-all').addEventListener('click', () => {
            const catV = !document.getElementById('category-section').classList.contains('hidden');
            const discV = !document.getElementById('discipline-section').classList.contains('hidden');
            if (catV) document.querySelectorAll('.cat-chip').forEach(c => {
                c.classList.add('active'); activeCategories.add(c.dataset.category);
            });
            if (discV) document.querySelectorAll('.disc-chip').forEach(c => {
                c.classList.add('active'); activeDisciplines.add(c.dataset.discipline);
            });
            applyFilters();
        });
        document.getElementById('btn-none').addEventListener('click', () => {
            const catV = !document.getElementById('category-section').classList.contains('hidden');
            const discV = !document.getElementById('discipline-section').classList.contains('hidden');
            if (catV) document.querySelectorAll('.cat-chip').forEach(c => {
                c.classList.remove('active'); activeCategories.delete(c.dataset.category);
            });
            if (discV) document.querySelectorAll('.disc-chip').forEach(c => {
                c.classList.remove('active'); activeDisciplines.delete(c.dataset.discipline);
            });
            applyFilters();
        });
        document.getElementById('year-min').addEventListener('change', function() {
            yearMin = parseInt(this.value) || 1945;
            applyFilters();
        });
        document.getElementById('year-max').addEventListener('change', function() {
            yearMax = parseInt(this.value) || 2026;
            applyFilters();
        });
        const panel = document.getElementById('filter-panel');
        const toggleBtn = document.getElementById('toggle-filters');
        document.getElementById('btn-close-filters').addEventListener('click', () => {
            panel.style.display = 'none';
            toggleBtn.style.display = 'block';
        });
        toggleBtn.addEventListener('click', () => {
            panel.style.display = 'block';
            toggleBtn.style.display = 'none';
        });
    }

    setTimeout(initFilters, 2000);

    // Click-to-Drive handler
    setTimeout(() => {
        if (typeof datamap !== 'undefined' && datamap.deckgl) {
            datamap.deckgl.setProps({
                onClick: ({index, picked}) => {
                    if (picked && datamap.metaData && datamap.metaData.url) {
                        const url = datamap.metaData.url[index];
                        if (url) window.open(url, '_blank');
                    }
                }
            });
        }
    }, 1000);
